# Keep the shared X11 socket directory in the standard ownership/mode.
#
# Raspberry Pi OS labwc/LightDM can create this directory as lightdm:lightdm
# during early greeter startup. A later Zero internal labwc session running as
# the authenticated user then fails to start Xwayland unless the directory is
# root-owned or owned by that user.
d /tmp/.X11-unix 1777 root root -
