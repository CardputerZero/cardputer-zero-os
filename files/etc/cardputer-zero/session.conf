# Cardputer Zero session configuration.

CARDPUTER_ZERO_SHELL="/opt/cardputer-zero-shell/bin/zero-shell"
CARDPUTER_ZERO_SESSION_NAME="Cardputer Zero"
CARDPUTER_ZERO_FB="/dev/fb1"

# Wayland/labwc session default:
#   labwc = start /usr/local/bin/cardputer-zero-labwc-session so the Zero
#   internal display is owned by labwc/wlroots instead of direct framebuffer
#   applications.
#
# framebuffer remains an explicit legacy compatibility mode only. It must not
# be used as an automatic fallback after login.
CARDPUTER_ZERO_SESSION_MODE="labwc"
CARDPUTER_ZERO_LABWC_SESSION="/usr/local/bin/cardputer-zero-labwc-session"
